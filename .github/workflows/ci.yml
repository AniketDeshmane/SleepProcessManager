name: CI - Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Verify
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Lint with basic checks
        run: |
          python -m py_compile sleep_manager.py
          echo "✅ Syntax check passed"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "SleepProcessManager" --icon=NONE sleep_manager.py

      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\SleepProcessManager.exe") {
            $size = (Get-Item "dist\SleepProcessManager.exe").Length / 1MB
            Write-Host "✅ Build successful! EXE size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "❌ EXE not found!"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepProcessManager-build
          path: dist/SleepProcessManager.exe
          retention-days: 7
